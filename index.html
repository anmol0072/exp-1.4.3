```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Seat Booking System</title>

<link rel="stylesheet" href="/style.css">

<style>
body{
    font-family: Arial, Helvetica, sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:0;
}

.container{
    width:600px;
    margin:60px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

#result{
    margin-top:20px;
    text-align:center;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h1>Redis Seat Booking</h1>

<form id="bookingForm">

<label>User Name</label>
<input type="text" id="user" placeholder="Enter your name" required>

<label>Seat Number</label>
<input type="number" id="seat" placeholder="Enter seat number" required>

<button type="submit">Book Seat</button>

</form>

<div id="result"></div>

</div>

<script src="/script.js"></script>

</body>
</html>
